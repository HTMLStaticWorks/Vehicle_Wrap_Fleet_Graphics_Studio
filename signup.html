<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up | Velocibrand Fleet Graphics Studio</title>
  <meta name="description" content="Create your Velocibrand account and start your premium vehicle wrap project today.">
  <link rel="icon" type="image/svg+xml" href="images/favicon.svg">
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      background: var(--bg-main);
    }

    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem;
      position: relative;
    }

    .auth-card {
      width: 100%;
      max-width: 480px;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      padding: 3rem 2.5rem;
      position: relative;
    }

    .auth-input-group {
      margin-bottom: 1.25rem;
    }

    .auth-input-group label {
      display: block;
      font-size: 0.88rem;
      font-weight: 540;
      color: var(--text-main);
      margin-bottom: 0.45rem;
    }

    .auth-input {
      width: 100%;
      padding: 0.82rem 1.1rem;
      font-size: 0.95rem;
      font-family: var(--font-body);
      border: 1.5px solid var(--border-color);
      border-radius: var(--radius-sm);
      background: var(--bg-main);
      color: var(--text-main);
      transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
      outline: none;
    }

    .auth-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(29, 140, 235, 0.15);
    }

    .auth-input::placeholder {
      color: var(--text-muted);
      opacity: 0.7;
    }

    .auth-divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 1.5rem 0;
      color: var(--text-muted);
      font-size: 0.85rem;
    }

    .auth-divider::before,
    .auth-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border-color);
    }

    .social-auth-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      width: 100%;
      padding: 0.82rem 1.5rem;
      border: 1.5px solid var(--border-color);
      border-radius: var(--radius-sm);
      background: var(--bg-main);
      color: var(--text-main);
      font-family: var(--font-body);
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: all var(--transition-fast);
      text-decoration: none;
      margin-bottom: 0.65rem;
    }

    .social-auth-btn:hover {
      border-color: var(--accent);
      background: rgba(29, 140, 235, 0.06);
    }

    .password-wrapper {
      position: relative;
    }

    .password-toggle {
      position: absolute;
      right: 1rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      display: flex;
      align-items: center;
    }

    /* RTL specific overrides for absolute positioned elements */
    html[dir="rtl"] .password-toggle {
      right: auto;
      left: 1rem;
    }

    .strength-bar {
      height: 4px;
      border-radius: 2px;
      background: var(--border-color);
      margin-top: 0.4rem;
      overflow: hidden;
    }

    .strength-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.3s ease, background 0.3s ease;
      width: 0%;
    }

    /* Requirement 5: Hover gives underline */
    .hover-underline:hover {
      text-decoration: underline !important;
    }

    /* Error alert banner */
    .error-msg {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #EF4444;
      padding: 0.75rem 1rem;
      border-radius: var(--radius-sm);
      font-size: 0.88rem;
      margin-bottom: 1.25rem;
      display: none;
    }

    /* Controls top right corner */
    .top-controls {
      position: absolute;
      top: 1.5rem;
      right: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      z-index: 1000;
    }

    html[dir="rtl"] .top-controls {
      right: auto;
      left: 1.5rem;
    }

    @media (max-width: 560px) {
      .auth-card {
        padding: 2rem 1.5rem;
      }

      .auth-page {
        padding-top: 6rem;
        align-items: flex-start;
      }
    }
  </style>
</head>

<body>

  <!-- Controls at the top-right corner (No Navbar) -->
  <div class="top-controls">
    <button id="rtl-toggle" class="theme-toggle" aria-label="Toggle RTL"
      style="font-size: 0.85rem; font-weight: 600; width: auto; padding: 0.5rem 0.75rem; border: 1px solid var(--border-color); border-radius: var(--radius-sm); background: var(--bg-card); color: var(--text-main); cursor: pointer;">RTL</button>
    <button id="theme-toggle" class="theme-toggle" aria-label="Toggle Theme"
      style="border: 1px solid var(--border-color); border-radius: 50%; background: var(--bg-card); color: var(--text-main); cursor: pointer; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;">
      <svg class="moon-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
      </svg>
      <svg class="sun-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="5"></circle>
        <line x1="12" y1="1" x2="12" y2="3"></line>
        <line x1="12" y1="21" x2="12" y2="23"></line>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
        <line x1="1" y1="12" x2="3" y2="12"></line>
        <line x1="21" y1="12" x2="23" y2="12"></line>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
      </svg>
    </button>
  </div>

  <!-- SIGN UP FORM PAGE -->
  <div class="auth-page">
    <div class="auth-card">

      <!-- Logo + heading -->
      <div style="text-align: center; margin-bottom: 2rem;">
        <a href="index.html" class="logo" style="justify-content: center; margin-bottom: 1.25rem; display: flex;">
          <div class="logo-icon">V</div>
          <div class="logo-text">Velocibrand<span>.</span></div>
        </a>
        <h1 style="font-size: 1.75rem; margin-bottom: 0.4rem;">Create Your Account</h1>
        <p style="color: var(--text-muted); font-size: 0.9rem;">Start your free fleet branding consultation today.</p>
      </div>

      <!-- Error Message Banner -->
      <div class="error-msg" id="error-msg"></div>

      <!-- Registration Form -->
      <form id="signup-form" onsubmit="handleSignup(event)">

        <!-- Full Name -->
        <div class="auth-input-group">
          <label for="full-name">Full Name</label>
          <input type="text" id="full-name" class="auth-input" placeholder="John Smith" required>
        </div>

        <!-- Business Email -->
        <div class="auth-input-group">
          <label for="email">Business Email</label>
          <input type="email" id="email" class="auth-input" placeholder="you@company.com" required>
        </div>

        <!-- Password -->
        <div class="auth-input-group">
          <label for="password">Password</label>
          <div class="password-wrapper">
            <input type="password" id="password" class="auth-input" placeholder="Min. 8 characters" required
              oninput="checkStrength(this.value)">
            <button type="button" class="password-toggle" onclick="togglePassword('password', this)"
              aria-label="Toggle password">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
            </button>
          </div>
          <p style="font-size: 0.78rem; color: var(--text-muted); margin-top: 0.3rem;" id="strength-label"></p>
        </div>

        <!-- Confirm Password -->
        <div class="auth-input-group">
          <label for="confirm-password">Confirm Password</label>
          <div class="password-wrapper">
            <input type="password" id="confirm-password" class="auth-input" placeholder="Confirm your password"
              required>
            <button type="button" class="password-toggle" onclick="togglePassword('confirm-password', this)"
              aria-label="Toggle password">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
            </button>
          </div>
        </div>

        <!-- Terms and Conditions -->
        <div style="display: flex; align-items: flex-start; gap: 0.75rem; margin-bottom: 1.5rem;">
          <input type="checkbox" id="agree-terms" required
            style="margin-top: 3px; accent-color: var(--accent); width: 16px; height: 16px; cursor: pointer;">
          <label for="agree-terms"
            style="font-size: 0.85rem; color: var(--text-muted); cursor: pointer; line-height: 1.5;">
            I agree to Velocibrand's <a href="#" class="hover-underline" style="color: var(--accent);">Terms of
              Service</a> and <a href="#" class="hover-underline" style="color: var(--accent);">Privacy Policy</a>
          </label>
        </div>

        <!-- Submit Button -->
        <button type="submit" class="btn btn-primary"
          style="width: 100%; font-size: 1rem; padding: 1rem; margin-bottom: 0.5rem;">
          Create Account
        </button>
      </form>

      <!-- Continue with Google, Facebook, Apple after submit button -->
      <div class="auth-divider">or continue with</div>
      <div style="display: flex; flex-direction: column; gap: 0.65rem;">
        <!-- Google -->
        <a href="#" class="social-auth-btn">
          <svg width="20" height="20" viewBox="0 0 24 24">
            <path fill="#4285F4"
              d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
            <path fill="#34A853"
              d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
            <path fill="#FBBC05"
              d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
            <path fill="#EA4335"
              d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
          </svg>
          Continue with Google
        </a>
        <!-- Facebook -->
        <a href="#" class="social-auth-btn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="#1877F2">
            <path
              d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z" />
          </svg>
          Continue with Facebook
        </a>
        <!-- Apple -->
        <a href="#" class="social-auth-btn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
            <path
              d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.81-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M15.97 4.17c.66-.81 1.11-1.93.99-3.06-1 .04-2.21.67-2.93 1.49-.62.69-1.16 1.84-1.01 2.96 1.12.09 2.27-.57 2.95-1.39z" />
          </svg>
          Continue with Apple
        </a>
      </div>

      <p style="text-align: center; margin-top: 1.75rem; font-size: 0.9rem; color: var(--text-muted);">
        Already have an account? <a href="login.html" class="hover-underline"
          style="color: var(--accent); font-weight: 540;">Log in here</a>
      </p>

    </div>
  </div>

  <script src="main.js"></script>
  <script>
    function togglePassword(fieldId, btn) {
      const field = document.getElementById(fieldId);
      const isText = field.type === 'text';
      field.type = isText ? 'password' : 'text';
      btn.innerHTML = isText
        ? '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>'
        : '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24M1 1l22 22"/></svg>';
    }

    function checkStrength(val) {
      const fill = document.getElementById('strength-fill');
      const label = document.getElementById('strength-label');
      let score = 0;
      if (val.length >= 8) score++;
      if (/[A-Z]/.test(val)) score++;
      if (/[0-9]/.test(val)) score++;
      if (/[^A-Za-z0-9]/.test(val)) score++;
      const configs = [
        { w: '0%', c: 'transparent', t: '' },
        { w: '25%', c: '#EF4444', t: 'Weak' },
        { w: '50%', c: '#F59E0B', t: 'Fair' },
        { w: '75%', c: '#3B82F6', t: 'Good' },
        { w: '100%', c: '#10B981', t: 'Strong' },
      ];
      fill.style.width = configs[score].w;
      fill.style.background = configs[score].c;
      label.textContent = configs[score].t;
      label.style.color = configs[score].c;
    }

    function handleSignup(e) {
      e.preventDefault();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirm-password').value;
      const errorMsg = document.getElementById('error-msg');

      if (password !== confirmPassword) {
        errorMsg.textContent = '⚠ Passwords do not match. Please verify and try again.';
        errorMsg.style.display = 'block';
        return;
      }

      errorMsg.style.display = 'none';
      const btn = e.target.querySelector('button[type="submit"]');
      btn.textContent = 'Creating your account…';
      btn.disabled = true;

      setTimeout(() => {
        btn.innerHTML = '✓ Account Created! Redirecting…';
        btn.style.background = '#10B981';
        setTimeout(() => { window.location.href = 'index.html'; }, 1500);
      }, 1800);
    }
  </script>
</body>

</html>
